; =============================================================================
;  Companion Robot Face - PlatformIO configuration
; =============================================================================
;  Target board (per your uploaded datasheet):
;     LCDWIKI E32R28T / E32N28T  ->  ESP32-WROOM-32E  +  ILI9341 240x320
;
;  TFT_eSPI is configured here via build_flags instead of editing User_Setup.h,
;  so the whole project stays self-contained and reproducible.
;
;  >>> If you actually have the ESP32-S3 + ST7796 320x480 board instead, see
;  >>> the commented [env:s3_st7796] block at the bottom and Config.h.
; =============================================================================

[env:esp32_ili9341]
platform  = espressif32
board     = esp32dev            ; ESP32-WROOM-32E
framework  = arduino
monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43

build_flags =
    ; ---- tell TFT_eSPI we are supplying the setup here ----
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    ; ---- SPI pins for the LCDWIKI E32R28T (from the datasheet pin table) ----
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1                 ; panel reset is tied to EN, so no GPIO reset
    -DTFT_BL=21                  ; backlight control
    -DTFT_BACKLIGHT_ON=HIGH
    ; ---- fonts (GLCD is enough; sprites do the real drawing) ----
    -DLOAD_GLCD=1
    -DSMOOTH_FONT=1
    ; ---- SPI speed: 40 MHz is safe. Try 55/80 MHz for more FPS if stable. ----
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000

; -----------------------------------------------------------------------------
; ALTERNATE BOARD - uncomment and use `pio run -e s3_st7796` if you switch.
; You must ALSO set BOARD_S3_ST7796 in Config.h.
; -----------------------------------------------------------------------------
